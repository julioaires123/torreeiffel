<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Financeiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>📊 Dashboard em Tempo Real</h1>

    <div class="cards">
      <div class="card">
        <h2>Dólar</h2>
        <p id="dolar">--</p>
      </div>

      <div class="card">
        <h2>Bitcoin</h2>
        <p id="bitcoin">--</p>
      </div>
    </div>

    <div class="horarios">
      <h2>Horários</h2>
      <p id="horarios">Carregando...</p>
    </div>

    <div class="ticker">
      <div class="ticker-content" id="ticker"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
